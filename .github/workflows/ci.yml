name: ci

on:
  push:
    branches:
      - master
  pull_request: {}

jobs:
  backend-test:
    name: Backend test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - run: pnpm install --frozen-lockfile
        working-directory: ./backend

      - run: pnpm exec prisma generate
        working-directory: ./backend

      - run: pnpm run lint
        working-directory: ./backend

      - run: pnpm test
        working-directory: ./backend

  backend-build:
    name: Backend build
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - run: pnpm install --frozen-lockfile
        working-directory: ./backend

      - run: pnpm exec prisma generate
        working-directory: ./backend

      - run: pnpm run build
        working-directory: ./backend

  frontend-test:
    name: Frontend test
    runs-on: ubuntu-latest
    needs: backend-build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: |
          corepack enable
          corepack prepare yarn@4.13.0 --activate

      - run: yarn install --immutable
        working-directory: ./frontend

      - run: yarn lint
        working-directory: ./frontend

      - run: yarn test
        working-directory: ./frontend

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    needs: frontend-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: |
          corepack enable
          corepack prepare yarn@4.13.0 --activate

      - run: yarn install --immutable
        working-directory: ./frontend

      - run: yarn build
        working-directory: ./frontend
