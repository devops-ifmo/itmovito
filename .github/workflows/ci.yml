name: ci

on:
  push:
    branches:
      - master
  pull_request: {}

jobs:
  backend-test:
    name: Backend test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: corepack enable

      - run: pnpm install --frozen-lockfile
        working-directory: ./backend

      - run: pnpm exec prisma generate
        working-directory: ./backend

      - run: pnpm run lint
        working-directory: ./backend

      - run: pnpm test
        working-directory: ./backend

  backend-build:
    name: Backend build
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: corepack enable

      - run: pnpm install --frozen-lockfile
        working-directory: ./backend

      - run: pnpm exec prisma generate
        working-directory: ./backend

      - run: pnpm run build
        working-directory: ./backend

  frontend-test:
    name: Frontend test
    runs-on: ubuntu-latest
    needs: backend-build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: corepack enable

      - run: yarn install --immutable
        working-directory: ./frontend

      - run: yarn lint
        working-directory: ./frontend

      - run: yarn test
        working-directory: ./frontend

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    needs: frontend-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: corepack enable

      - run: yarn install --immutable
        working-directory: ./frontend

      - run: yarn build
        working-directory: ./frontend

  publish-images:
    name: Publish Docker images to MWS Registry
    runs-on: ubuntu-latest
    needs:
      - backend-build
      - frontend-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Login to MWS Registry
        run: echo "${{ secrets.MWS_REGISTRY_API_KEY }}" | docker login -u apikey --password-stdin registry.mwsapis.ru

      - name: Build and push backend image
        run: |
          docker build \
            -t registry.mwsapis.ru/itmovito/itmovito-registry/backend:${{ github.run_number }} \
            -t registry.mwsapis.ru/itmovito/itmovito-registry/backend:latest \
            ./backend
          docker push registry.mwsapis.ru/itmovito/itmovito-registry/backend:${{ github.run_number }}
          docker push registry.mwsapis.ru/itmovito/itmovito-registry/backend:latest

      - name: Build and push frontend image
        run: |
          docker build \
            -t registry.mwsapis.ru/itmovito/itmovito-registry/frontend:${{ github.run_number }} \
            -t registry.mwsapis.ru/itmovito/itmovito-registry/frontend:latest \
            ./frontend
          docker push registry.mwsapis.ru/itmovito/itmovito-registry/frontend:${{ github.run_number }}
          docker push registry.mwsapis.ru/itmovito/itmovito-registry/frontend:latest
