name: ci

on:
  push:
    branches:
      - master
  pull_request: {}

jobs:
  backend-test:
    name: Backend test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: corepack enable

      - run: pnpm install --frozen-lockfile
        working-directory: ./backend

      - run: pnpm exec prisma generate
        working-directory: ./backend

      - run: pnpm run lint
        working-directory: ./backend

      - run: pnpm test
        working-directory: ./backend

  backend-build:
    name: Backend build
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: corepack enable

      - run: pnpm install --frozen-lockfile
        working-directory: ./backend

      - run: pnpm exec prisma generate
        working-directory: ./backend

      - run: pnpm run build
        working-directory: ./backend

  frontend-test:
    name: Frontend test
    runs-on: ubuntu-latest
    needs: backend-build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: corepack enable

      - run: yarn install --immutable
        working-directory: ./frontend

      - run: yarn lint
        working-directory: ./frontend

      - run: yarn test
        working-directory: ./frontend

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    needs: frontend-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: corepack enable

      - run: yarn install --immutable
        working-directory: ./frontend

      - run: yarn build
        working-directory: ./frontend

  publish-images:
    name: Publish Docker images to MWS Registry
    runs-on: ubuntu-latest
    needs:
      - backend-build
      - frontend-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Install MWS CLI
        run: curl -sSL https://storage.mwsapis.ru/mws-cli/install.sh | bash

      - name: Add MWS CLI to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Write MWS service account key to temp file
        run: |
          mkdir -p "$RUNNER_TEMP/mws"
          cat > "$RUNNER_TEMP/mws/service-account-key.json" <<'EOF'
          ${{ secrets.MWS_SERVICE_ACCOUNT_KEY }}
          EOF
          chmod 600 "$RUNNER_TEMP/mws/service-account-key.json"

      - name: Init MWS profile using service account key
        run: mws init --service-account-authorized-key "$RUNNER_TEMP/mws/service-account-key.json"

      - name: Configure Docker credential helper for MWS Registry
        run: mws registry configure-docker

      - name: Build and push backend image
        run: |
          docker build \
            -t registry.mwsapis.ru/itmovito/itmovito-registry/backend:${{ github.sha }} \
            -t registry.mwsapis.ru/itmovito/itmovito-registry/backend:latest \
            ./backend
          docker push registry.mwsapis.ru/itmovito/itmovito-registry/backend:${{ github.sha }}
          docker push registry.mwsapis.ru/itmovito/itmovito-registry/backend:latest

      - name: Build and push frontend image
        run: |
          docker build \
            -t registry.mwsapis.ru/itmovito/itmovito-registry/frontend:${{ github.sha }} \
            -t registry.mwsapis.ru/itmovito/itmovito-registry/frontend:latest \
            ./frontend
          docker push registry.mwsapis.ru/itmovito/itmovito-registry/frontend:${{ github.sha }}
          docker push registry.mwsapis.ru/itmovito/itmovito-registry/frontend:latest
