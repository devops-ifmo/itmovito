apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: itmovito
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/devops-ifmo/itmovito.git
    targetRevision: master
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: itmovito
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
