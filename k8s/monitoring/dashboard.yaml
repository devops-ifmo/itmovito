apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-itmovito
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  itmovito.json: |
    {
      "uid": "itmovito",
      "title": "itmovito — Backend Overview",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "time": { "from": "now-30m", "to": "now" },
      "tags": ["itmovito"],
      "templating": {
        "list": [
          {
            "name": "pod", "label": "Pod", "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": "label_values(http_requests_total{namespace=\"itmovito\"}, pod)",
            "includeAll": true, "multi": true, "refresh": 2,
            "current": { "text": "All", "value": "$__all" }
          }
        ]
      },
      "panels": [
        {
          "id": 1, "type": "stat", "title": "Backend replicas",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "kube_deployment_status_replicas{namespace=\"itmovito\", deployment=\"backend\"}" }]
        },
        {
          "id": 2, "type": "stat", "title": "RPS (total)",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "sum(rate(http_requests_total{namespace=\"itmovito\", pod=~\"$pod\"}[1m]))" }],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },
        {
          "id": 3, "type": "stat", "title": "p95 latency",
          "gridPos": { "x": 12, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket{namespace=\"itmovito\", pod=~\"$pod\"}[5m])))" }],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "id": 4, "type": "stat", "title": "Errors 5xx /sec",
          "gridPos": { "x": 18, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "sum(rate(http_requests_total{namespace=\"itmovito\", pod=~\"$pod\", status=~\"5..\"}[1m]))" }],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },

        {
          "id": 10, "type": "timeseries", "title": "Requests/sec per pod",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{
            "expr": "sum by (pod) (rate(http_requests_total{namespace=\"itmovito\", pod=~\"$pod\"}[1m]))",
            "legendFormat": "{{pod}}"
          }],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },
        {
          "id": 11, "type": "timeseries", "title": "Requests/sec by route",
          "gridPos": { "x": 12, "y": 4, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{
            "expr": "sum by (method, route) (rate(http_requests_total{namespace=\"itmovito\", pod=~\"$pod\"}[1m]))",
            "legendFormat": "{{method}} {{route}}"
          }],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },

        {
          "id": 20, "type": "timeseries", "title": "p95 latency per pod (s)",
          "gridPos": { "x": 0, "y": 12, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{
            "expr": "histogram_quantile(0.95, sum by (pod, le) (rate(http_request_duration_seconds_bucket{namespace=\"itmovito\", pod=~\"$pod\"}[5m])))",
            "legendFormat": "{{pod}}"
          }],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "id": 21, "type": "timeseries", "title": "CPU usage per pod (cores)",
          "gridPos": { "x": 12, "y": 12, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{
            "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"itmovito\", pod=~\"$pod\", container!=\"\"}[2m]))",
            "legendFormat": "{{pod}}"
          }]
        },

        {
          "id": 30, "type": "logs", "title": "Backend logs (Loki)",
          "gridPos": { "x": 0, "y": 20, "w": 24, "h": 10 },
          "datasource": { "type": "loki", "uid": "loki" },
          "options": { "showTime": true, "wrapLogMessage": true },
          "targets": [{
            "expr": "{namespace=\"itmovito\", pod=~\"backend.*\"} |~ \"$pod\""
          }]
        }
      ]
    }
