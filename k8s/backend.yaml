apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: itmovito
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: registry.mwsapis.ru/itmovito/itmovito-registry/backend:4f77029824f30029c5b130abbcd581377b39280e
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - |
              set -e
              node -e 'const net = require("net"); const wait = () => { const socket = net.createConnection({ host: "db", port: 5432 }, () => { socket.end(); process.exit(0); }); socket.on("error", () => setTimeout(wait, 1000)); socket.setTimeout(1000, () => { socket.destroy(); setTimeout(wait, 1000); }); }; wait();'
              pnpm exec prisma migrate deploy
              node dist/seed.js
              node dist/main
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          envFrom:
            - secretRef:
                name: backend-env
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: itmovito
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 3000
      targetPort: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend
  namespace: itmovito
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 15
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
        - type: Percent
          value: 100
          periodSeconds: 30
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
