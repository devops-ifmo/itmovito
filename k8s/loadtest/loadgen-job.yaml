apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-script
  namespace: itmovito
data:
  script.js: |
    import http from 'k6/http';
    import { check, sleep } from 'k6';

    export const options = {
      stages: [
        { duration: '30s', target: 20 },
        { duration: '1m', target: 100 },
        { duration: '2m', target: 200 },
        { duration: '1m', target: 0 },
      ],
      thresholds: {
        http_req_failed: ['rate<0.05'],
      },
    };

    const BASE_URL = __ENV.BASE_URL || 'http://backend.itmovito.svc.cluster.local:3000';

    export default function () {
      const res = http.get(`${BASE_URL}/item`);
      check(res, { 'status is 2xx': (r) => r.status >= 200 && r.status < 300 });
      sleep(0.1);
    }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: k6-loadtest
  namespace: itmovito
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: k6
          image: grafana/k6:latest
          args: ['run', '/scripts/script.js']
          env:
            - name: BASE_URL
              value: http://backend.itmovito.svc.cluster.local:3000
          volumeMounts:
            - name: script
              mountPath: /scripts
      volumes:
        - name: script
          configMap:
            name: k6-script
