services:
  backend:
    image: registry.mwsapis.ru/itmovito/itmovito-registry/backend:1.0.1
    restart: always
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/nestdb
      CORS_ORIGINS: http://171.22.73.106
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "pnpm exec prisma migrate deploy && pnpm run db:seed && pnpm run start"

  web:
    image: registry.mwsapis.ru/itmovito/itmovito-registry/frontend:1.0.1
    restart: always
    ports:
      - '80:80'
    depends_on:
      - backend

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nestdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user -d nestdb']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
