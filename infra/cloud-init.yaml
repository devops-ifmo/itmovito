#cloud-config

package_update: true

users:
  - name: itmo
    groups: sudo
    shell: /bin/bash
    sudo: 'ALL=(ALL) NOPASSWD:ALL'
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDrz7X5urgeoO7tesDVsAGO9uiRmLDBufrETOpKcBanM idale@honorbook
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEP3myEBhhiyvUhAhIiBbq1eqkxgj2ihnZWeNGgXJk9A filfju@gmail.com

runcmd:
  # Установка Docker по документации
  - apt install -y ca-certificates curl

  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc

  - |
    tee /etc/apt/sources.list.d/docker.sources <<EOF
    Types: deb
    URIs: https://download.docker.com/linux/ubuntu
    Suites: $(. /etc/os-release && echo "$${UBUNTU_CODENAME:-$VERSION_CODENAME}")
    Components: stable
    Architectures: $(dpkg --print-architecture)
    Signed-By: /etc/apt/keyrings/docker.asc
    EOF

  - apt update

  - apt install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

  - systemctl enable docker
  - systemctl start docker
